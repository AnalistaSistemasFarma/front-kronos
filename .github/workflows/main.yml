name: Deploy to Production (Self-Hosted)

on:
  push:
    branches:
      - main

# El runner es self-hosted en el MISMO servidor de producción (serfarma05) y corre
# como DFARUNIADM\nicolas.rivera, la cuenta dueña del código y del daemon pm2 que
# ejecuta GSS-Front. Por eso el deploy se construye directamente sobre el
# repositorio de prod (C:\Users\administrador.DFARUNIADM\projects\front-kronos),
# que SÍ contiene los archivos git-ignored necesarios para compilar: dbconfig.js
# (credenciales SQL) y app/generated/prisma (cliente Prisma generado).
#
# El esquema anterior (checkout limpio -> npm run build) fallaba siempre con 102
# errores "Module not found: ../dbconfig" y "../app/generated/prisma" porque esos
# archivos no existen en un checkout limpio. Además hacia `pm2 restart all` (que
# reinicia las ~25 apps de la flota) y `xcopy` sobre el repo de prod (que pisaba
# cambios locales no commiteados). Este esquema corrige ambos.
#
# MIGRACIONES PRISMA: igual que el deploy de PRUEBAS, este workflow aplica las
# migraciones pendientes (`npx prisma migrate deploy`) y regenera el cliente
# (`npx prisma generate`) en cada deploy. Como en Windows la app en ejecución
# mantiene bloqueado query_engine-windows.dll.node (lo que hace fallar el rename
# del cliente con EPERM), se DETIENE GSS-Front antes de migrar/generar/compilar y
# se vuelve a arrancar al final (mismo patrón que el deploy de pruebas). Por eso
# este deploy ya no usa `pm2 reload` de cero downtime: hay una breve ventana de
# indisponibilidad mientras se regenera el cliente Prisma.

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy on production repository
        shell: cmd
        run: |
          cd /d C:\Users\administrador.DFARUNIADM\projects\front-kronos || exit /b 1

          echo === Actualizando codigo (git pull origin main) ===
          git fetch origin || exit /b 1
          git pull origin main || exit /b 1

          echo === Instalando dependencias ===
          call npm install || exit /b 1

          echo === Deteniendo GSS-Front (liberar lock de query_engine-windows.dll.node) ===
          call pm2 stop GSS-Front || exit /b 1

          echo === Aplicando migraciones Prisma (migrate deploy) ===
          call npx prisma migrate deploy || exit /b 1

          echo === Regenerando cliente Prisma (generate) ===
          call npx prisma generate || exit /b 1

          echo === Compilando (next build) ===
          call npm run build || exit /b 1

          echo === Reiniciando GSS-Front ===
          call pm2 restart GSS-Front || exit /b 1
          call pm2 save
