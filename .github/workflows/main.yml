name: Deploy to Production (Self-Hosted)

on:
  push:
    branches:
      - main

# Auto-deploy de PRODUCCIÓN (serfarma05, app pm2 GSS-Front en :3003).
#
# RUNNER FIJO: se ancla con la etiqueta `serfarma05` (además de self-hosted)
# porque el repo tiene DOS runners self-hosted Windows (prod y la .230). Con solo
# `self-hosted` el job podía caer en la máquina equivocada y fallar en el `cd`.
#
# CÓDIGO: `git fetch` + `git reset --hard origin/main` (NO `git pull`). `pull` se
# aborta si el árbol de prod tiene cambios locales en archivos versionados (eso
# tumbó el deploy del 2026-06-30). `reset --hard` solo toca archivos VERSIONADOS;
# los git-ignored (dbconfig.js, app/generated/prisma, .env) sobreviven porque NO
# ejecutamos `git clean`.
#
# PRISMA: este deploy NO corre `prisma generate` ni `migrate deploy`. Motivos:
#   - `generate` falla con EPERM en Windows porque GSS-Front Y kronos-mcp mantienen
#     bloqueado query_engine-windows.dll.node (lo documentó el commit 3957e49 que
#     quitó ese paso). El cliente ya está generado en disco (app/generated/prisma).
#   - `migrate deploy` falla con P3005 (la BD de prod no está baselined para
#     migraciones de Prisma).
#   Si cambia prisma/schema.prisma o hay una migración nueva, se aplican A MANO en
#   la ventana de promoción, con backup previo (detener apps, generate/migrar,
#   reiniciar). El deploy automático asume que el esquema no cambió.
#
# CERO DOWNTIME: se usa `pm2 reload` (recarga grácil instancia por instancia del
# cluster), no `stop`/`restart`. Si el build falla, NO se recarga: GSS-Front sigue
# sirviendo el build anterior, así que prod nunca queda caído.

concurrency:
  group: deploy-prod-serfarma05
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, serfarma05]
    env:
      PROJECT_DIR: C:\Users\administrador.DFARUNIADM\projects\front-kronos

    steps:
      - name: Actualizar codigo (fetch + reset --hard a origin/main)
        shell: cmd
        run: |
          cd /d %PROJECT_DIR% || exit /b 1
          echo === git fetch origin ===
          git fetch origin || exit /b 1
          echo === git reset --hard origin/main ===
          git reset --hard origin/main || exit /b 1
          git rev-parse --short HEAD

      - name: Instalar dependencias y compilar
        shell: cmd
        run: |
          cd /d %PROJECT_DIR% || exit /b 1
          echo === npm install ===
          call npm install || exit /b 1
          echo === next build ===
          call npm run build || exit /b 1

      - name: Recargar GSS-Front (reload, cero downtime)
        shell: cmd
        run: |
          cd /d %PROJECT_DIR% || exit /b 1
          call pm2 reload GSS-Front || exit /b 1
          call pm2 save
